<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="150" height="45">
  <defs>
    <style>
      @keyframes zoom {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      @keyframes glow {
        0%, 100% { filter: drop-shadow(0 0 2px #FF6B6B); }
        50% { filter: drop-shadow(0 0 8px #FF6B6B); }
      }
      .badge-rect { animation: glow 2s ease-in-out infinite; }
      .badge-group:hover .badge-rect { animation: zoom 0.4s ease-in-out, glow 2s ease-in-out infinite; }
    </style>
  </defs>
  <g class="badge-group">
    <rect class="badge-rect" x="5" y="5" width="190" height="50" rx="8" fill="#FF6B6B"/>
    <text x="100" y="35" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Live Demo</text>
  </g>
</svg>
